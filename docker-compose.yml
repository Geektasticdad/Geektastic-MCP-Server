services:
  mcp-server:
    extra_hosts:
      - "family.gtastic.xyz:host-gateway"
    build: .
    image: geektastic-mcp-server:latest
    container_name: geektastic_mcp_server-app
    ports:
      - "8084:8080"
    environment:
      DATABASE_URL: postgresql://mcp:${DB_PASSWORD}@postgres:5432/mcp
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PORT: 8080
      NODE_ENV: production
      TRUST_PROXY: ${TRUST_PROXY:-false}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: geektastic_mcp_server-db
    environment:
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: mcp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d mcp"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
